<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Bloco de Notas</title>
  </head>

  <body>
    <h1>Bloco de Notas</h1>

    <textarea
      id="texto"
      rows="8"
      cols="50"
      placeholder="Digite sua nota"
    ></textarea>

    <br /><br />

    <button id="salvar">Salvar</button>

    <h2>Notas</h2>

    <ul id="listaNotas"></ul>

    <script>
      document.getElementById("salvar").addEventListener("click", salvar);

      async function salvar() {
        const texto = document.getElementById("texto").value;

        const resposta = await fetch("http://localhost:8080/notas", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            texto: texto,
          }),
        });

        const nota = await resposta.json();

        document.getElementById("texto").value = "";

        carregarNotas();
      }

      async function carregarNotas() {
        const resposta = await fetch("http://localhost:8080/notas");

        const notas = await resposta.json();

        const lista = document.getElementById("listaNotas");

        lista.innerHTML = "";

        notas.forEach(function (nota) {
          const item = document.createElement("li");

          item.textContent = nota.texto + " ";

          const botao = document.createElement("button");

          botao.textContent = "Excluir";
          botao.addEventListener("click", function () {
            excluirNota(nota.id);
          });

          const botao2 = document.createElement("button");
          botao2.textContent = "Atualizar";

          botao2.addEventListener("click", function () {
            atualizarNota(nota.id, nota.texto);
          });

          item.appendChild(botao);
          item.appendChild(botao2);

          lista.appendChild(item);

        });
      }

      async function excluirNota(id) {
        await fetch("http://localhost:8080/notas/" + id, {
          method: "DELETE",
        });

        carregarNotas();
      }

      async function atualizarNota(id, textoAtual) {
        const novoTexto = prompt("Digite o novo texto:", textoAtual);

        if (novoTexto === null) {
          return;
        }

        await fetch("http://localhost:8080/notas/" + id, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            texto: novoTexto,
          }),
        });

        carregarNotas();
      }

      carregarNotas();
    </script>
  </body>
</html>
